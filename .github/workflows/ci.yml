name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: typecheck · tests · phase gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck (Phase 0)
        run: npm run typecheck

      - name: Tests
        run: npm test

      - name: Phase 1 · close the loop
        run: npx tsx packages/simulation/src/dev/loop-check.ts

      - name: Phase 2 · state estimator
        run: npx tsx packages/simulation/src/dev/estimator-check.ts

      - name: Phase 3 · resolver vs hold baseline
        run: npx tsx packages/simulation/src/dev/resolver-check.ts

      - name: Phase 4 · escalation scorecard
        run: npm run harness -- 30

      - name: Phase 5 · backtest (record → replay)
        run: npm run backtest

      - name: Real-feed adapter (vendor files → estimated state)
        run: npm run fixtures && npm run adapter

      - name: Live vendor-API sync (auth · paginate · backfill · retry, vs mock)
        run: npm run live-sync

      - name: Incremental sync (watermark · lookback · dedup · resume, vs mock)
        run: npm run incremental-sync

      - name: Multi-source ingestion (telematics + WMS, merged, vs mocks)
        run: npm run orchestrate

      - name: Decisions on estimated state (principle #5 fidelity)
        run: npm run live-detect

      - name: ASN / EDI-856 feed closes the inbound gap (precision lift)
        run: npm run asn

      - name: Control tower end to end (ingest → estimate → detect → resolve)
        run: npm run control-tower-check
